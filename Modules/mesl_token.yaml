name: MESL Token 自动抓取
description: 从请求头提取 Token 写入 GitHub Gist
author: lamchey
icon: square.and.arrow.up.fill

env_schema:
  GIST_ID:
    name: Gist ID
    description: GitHub Gist 的 ID
  GIST_TOKEN:
    name: GitHub Token
    description: 用于读写 Gist 的 Fine-grained Token
  GIST_FILE:
    name: Gist 文件名
    description: Gist 中存储 Token 的 JSON 文件名
    default_value: airport_token.json
  AIRPORT_ID:
    name: 机场标识
    description: 机场的唯一标识
    default_value: mesl
mitm:
  hostnames:
    # mesl官网
    - "*.meslcloud.com"
    - "*.meslcloud.org"

scriptings:
  - http_response:
      name: MESL Token 捕获
      # match Token的路径
      match: ".*/api/v1/user/checkLogin$"
      script_url: https://raw.githubusercontent.com/lamchey/Egern/refs/heads/main/Modules/airport_sync.js
      body_required: false
      timeout: 30
