name: DNS enhanced
description: 1.域名按所属DNS进行分流解析 2.路由器地址使用系统DNS进行解析 3.特殊地址使用规范DNS进行解析
author: lamchey

dns:
  upstreams:
    Alibaba:
    - h3://dns.alidns.com/dns-query
    Tencent:
    - https://doh.pub/dns-query
    Baidu:
    - 180.76.76.76
    360:
    - https://doh.360.cn/dns-query
    ByteDance:
    - 180.184.1.1

