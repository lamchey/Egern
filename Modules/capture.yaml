name: Checkin  Capture
desc: Capture cookies or tokens for the checkin project and upload encrypted data to one Gist file.

env_schema:
  GIST_ID:
    title: Gist ID
    description: Target private Gist ID.
    required: true
  GIST_TOKEN:
    title: Gist Token
    description: GitHub token with Gist write permission.
    required: true
    sensitive: true
  GIST_FILE:
    title: Gist File
    description: File name inside the Gist. 
    required: false
  GIST_SECRET:
    title: Gist Secret
    description: AES secret used by both Egern and the dashboard worker.
    required: true
    sensitive: true
  ACCOUNT_ID:
    title: Account ID
    description: Optional suffix for multi-account entries, for example main or wife.
    required: false

mitm:
  hostnames:
    - app.mixcapp.com
    - www.nodeseek.com
    - api.pingmeapp.net
    - www.v2ex.com
    - api.tuhu.cn
    - user-api-prd-mx.wandafilm.com
    - m.xiaomiyoupin.com
    - shop-api.retail.mi.com
    - cn-wxmall.dreame.tech
    - superapp-public.kiwa-tech.com

scriptings:
  - http_request:
      name: Checkin Capture
      match: ^https:\/\/(www\.nodeseek\.com\/setting|api\.pingmeapp\.net\/app\/queryBalanceAndBonus|www\.v2ex\.com\/(member|mission)|api\.tuhu\.cn\/User\/(GetMemberSignInInfoAsync|GetRightsList|GetUserCurrentAndNextGradeInfo)|user-api-prd-mx\.wandafilm\.com\/user\/user_info|m\.xiaomiyoupin\.com\/mtop\/act\/redPacketSign\/getActInfo|shop-api\.retail\.mi\.com\/mtop\/mf\/act\/infinite\/(do|done)|superapp-public\.kiwa-tech\.com\/activity\/wxapp\/signin\/(query|querySite|querySwitch|queryFragment|signin))(?:[\/?#]|$)
      script_url: ./capture.js
      timeout: 30
      body_required: false
  - http_request:
      name: Checkin Capture Body
      match: ^https:\/\/(app\.mixcapp\.com\/mixc\/gateway|cn-wxmall\.dreame\.tech\/main\/my\/info)(?:[\/?#]|$)
      script_url: ./capture.js
      timeout: 30
      body_required: true
