name: 机场 Token 自动同步
description: 拦截机场指定接口中的 Authorization 请求头，自动同步到 GitHub Gist，供油猴脚本跨设备自动续期使用。
author: lamchey
icon: square.and.arrow.up.fill

env_schema:
  TARGET_URL:
    name: Token接口URL
    description: 用于获取 Authorization 的接口地址
    default_value :https://panel.meslcloud.com/api/v1/user/checkLogin

  GIST_ID:
    name: Gist ID
    description: GitHub Gist 的 ID（URL 末尾那串字符）

  GIST_TOKEN:
    name: GitHub Token
    description: 用于读写 Gist 的 Fine-grained Token（需要 Gist Read & Write 权限）

  GIST_FILE:
    name: Gist 文件名
    description: Gist 中存储 Token 的 JSON 文件名，油猴脚本需与此保持一致
    default_value: airport_token.json

mitm:
  hostnames:
    - "*.meslcloud.com"

scriptings:
  - http_response:
      name: 机场登录 Token 捕获
      match: '^https://panel\.meslcloud\.com/.*$'
      script_url: https://raw.githubusercontent.com/lamchey/Egern/main/Modules/Airport_Token/airport_sync.js
      body_required: true
      max_size: 524288
      timeout: 30
