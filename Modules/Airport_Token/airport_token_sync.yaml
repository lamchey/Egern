name: 机场 Token 自动同步
description: 从请求头提取 Authorization Token 写入 GitHub Gist，供油猴脚本读取实现跨设备自动续期。
author: lamchey
icon: square.and.arrow.up.fill

env_schema:
  GIST_ID:
    name: Gist ID
    description: GitHub Gist 的 ID
  GIST_TOKEN:
    name: GitHub Token
    description: 用于读写 Gist 的 Fine-grained Token（需要 Gist Read & Write 权限）
  GIST_FILE:
    name: Gist 文件名
    description: Gist 中存储 Token 的 JSON 文件名，与油猴脚本保持一致
    default_value: airport_token.json
  AIRPORT_ID:
    name: 机场标识
    description: 当前机场的唯一标识，用于在 Gist 文件中区分多个机场（如 airport1、airport2）

mitm:
  hostnames:
    # 机场官网
    - "panel.meslcloud.com"

scriptings:
  - http_response:
      name: 机场 Token 捕获
      # match Token的路径
      match: ".*/api/v1/user/checkLogin$"
      script_url: https://raw.githubusercontent.com/lamchey/Egern/main/Modules/Airport_Token/airport_sync.js
      body_required: false
      timeout: 30
